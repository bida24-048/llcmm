<!DOCTYPE html>
<html>
<head>
  <title>Crash predictor</title>
  

  <style>
    body {
      background: #0b0b0b;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    input, button {
      padding: 10px;
      margin: 6px;
      font-size: 14px;
    }

    .low { color: #00bfff; }
    .med { color: #a020f0; }
    .high { color: #ff4da6; }

    #box {
      margin-top: 20px;
      border-top: 1px solid #333;
      padding-top: 15px;
    }

    #lockscreen {
      position: fixed;
      inset: 0;
      background: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #error {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<!-- LOCK -->
<div id="lockscreen">
  <h2>🔐 Enter Passcode</h2>
  <input type="password" id="passcode">
  <button onclick="unlock()">Unlock</button>
  <div id="error"></div>
</div>

<h2>📊 Signal Builder → Predictor</h2>

<p id="stepText">Step 1: Enter Time</p>

<input id="timeInput" placeholder="HH:MM">
<input id="spikeInput" placeholder="Spike" style="display:none;">

<br>

<button onclick="nextStep()">Next Entry</button>
<button onclick="generate()" id="genBtn" disabled>Generate Predictions</button>

<div id="result"></div>

<script>

const PASS = "colsnist";

/* ---------------- LOCK ---------------- */
function unlock(){
  let p = document.getElementById("passcode");

  if(p.value === PASS){
    document.getElementById("lockscreen").style.display = "none";
  } else {
    document.getElementById("error").innerText = "Wrong passcode";
    p.value = "";
  }
}

/* ---------------- DATA ---------------- */
let step = 1;
let currentTime = "";
let data = [];

/* ---------------- INPUT FLOW ---------------- */

function nextStep(){

  let timeInput = document.getElementById("timeInput");
  let spikeInput = document.getElementById("spikeInput");
  let stepText = document.getElementById("stepText");

  // STEP 1: TIME
  if(step === 1){

    if(!timeInput.value){
      alert("Enter time");
      return;
    }

    currentTime = timeInput.value;

    timeInput.style.display = "none";
    spikeInput.style.display = "inline-block";

    stepText.innerText = "Step 2: Enter Spike";

    step = 2;
    return;
  }

  // STEP 2: SPIKE
  if(step === 2){

    let val = parseFloat(spikeInput.value);

    if(isNaN(val)){
      alert("Enter spike value");
      return;
    }

    data.push({ time: currentTime, spike: val });

    spikeInput.value = "";

    timeInput.style.display = "inline-block";
    spikeInput.style.display = "none";

    stepText.innerText = `Step ${data.length + 1}: Enter Time`;

    step = 1;

    // enable generate after 10 entries
    if(data.length === 10){
      document.getElementById("genBtn").disabled = false;
      stepText.innerText = "10 entries complete — click Generate";
    }
  }
}

/* ---------------- PREDICTOR ---------------- */

function seededRandom(seed){
  let x = Math.sin(seed) * 10000;
  return x - Math.floor(x);
}

function classify(v){
  if(v < 2) return "low";
  if(v < 5) return "med";
  return "high";
}

function generate(){

  if(data.length < 5){
    alert("Need at least 5 entries");
    return;
  }

  let values = data.map(d => d.spike);

  let avg = values.reduce((a,b)=>a+b,0)/values.length;
  let lastAvg = values.slice(-3).reduce((a,b)=>a+b,0)/Math.min(3, values.length);

  let seed = avg * 100;

  let output = "<h3>📡 Predicted Next 10 Signals</h3>";

  for(let i = 1; i <= 10; i++){

    let r = seededRandom(seed + i);
    let val;

    // biased randomness using your data
    if(lastAvg > avg && r < 0.35){
      val = 5 + r * 25;
    }
    else if(lastAvg < avg && r < 0.75){
      val = 1 + r * 2.5;
    }
    else{
      val = 2 + r * 6;
    }

    let cls = classify(val);

    output += `
      <p class="${cls}">
        NEXT ${i} → <b>${val.toFixed(2)}x</b>
      </p>
    `;
  }

  document.getElementById("result").innerHTML = output;
}
</script>
  <h6>made by Lizzy</h6>

</body>
</html>
