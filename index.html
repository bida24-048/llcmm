<!DOCTYPE html>
<html>
<head>
  <title>Smart Signal Simulator</title>

  <style>
    body {
      background: #0b0b0b;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    input, button {
      padding: 10px;
      margin: 6px;
      font-size: 14px;
    }

    .low { color: #00bfff; }
    .med { color: #a020f0; }
    .high { color: #ff4da6; }

    #lockscreen {
      position: fixed;
      width: 100%;
      height: 100%;
      background: black;
      top: 0;
      left: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 9999;
    }

    #error { color: red; }
  </style>
</head>

<body>

<!-- LOCK -->
<div id="lockscreen">
  <h2>🔐 Enter Passcode</h2>
  <input type="password" id="passcode">
  <button onclick="unlock()">Unlock</button>
  <div id="error"></div>
</div>

<h2>📊 Smart Signal Generator</h2>

<input type="text" id="time" placeholder="Start Time (HHMM)">
<br>
<input type="text" id="signalsInput" placeholder="Your signals e.g. 2,1,10">

<br>
<button onclick="generate()">Generate</button>

<div id="result"></div>

<script>

const PASS = "colsnist";

// AUTO FORMAT TIME
window.onload = () => {
  document.getElementById("passcode").focus();

  document.getElementById("time").addEventListener("input", function(){
    let v = this.value.replace(/\D/g, "");
    if(v.length >= 3){
      this.value = v.slice(0,2) + ":" + v.slice(2,4);
    } else {
      this.value = v;
    }
  });
};

// UNLOCK
function unlock(){
  let f = document.getElementById("passcode");
  if(f.value === PASS){
    document.getElementById("lockscreen").style.display = "none";
  } else {
    document.getElementById("error").innerText = "Wrong passcode";
    f.value = "";
  }
}

// TIME PARSE
function parseTime(t){
  let [h,m] = t.split(":").map(Number);
  return {h,m};
}

function format(h,m){
  if(m >= 60){
    h += Math.floor(m/60);
    m %= 60;
  }
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

// RANDOM GENERATOR
function genValue(){
  let r = Math.random();

  if(r < 0.7) return 1 + Math.random()*2;      // low
  if(r < 0.95) return 2 + Math.random()*5;     // medium
  return 5 + Math.random()*20;                 // high spike
}

// CLASSIFY COLOR
function classify(v){
  if(v < 2) return "low";
  if(v < 5) return "med";
  return "high";
}

// MAIN FUNCTION
function generate(){

  let t = document.getElementById("time").value;
  let raw = document.getElementById("signalsInput").value;

  if(!t || !raw){
    alert("Enter time + signals");
    return;
  }

  let time = parseTime(t);

  // USER INPUT SIGNALS
  let userSignals = raw.split(",")
    .map(x => parseFloat(x.trim()))
    .filter(x => !isNaN(x));

  let output = [];

  let h = time.h;
  let m = time.m;

  // STEP 1: USER SIGNALS (seed data)
  for(let v of userSignals){
    let cls = classify(v);

    output.push(`
      <p class="${cls}">
        ${format(h,m)} → <b>${v.toFixed(2)}x</b>
      </p>
    `);

    // small chance same minute clustering
    if(Math.random() > 0.5) m++;
  }

  // STEP 2: COMPLETE TO 10 TOTAL
  let total = 10;

  for(let i = userSignals.length; i < total; i++){

    if(Math.random() > 0.5) m++;

    let val = genValue();
    let cls = classify(val);

    output.push(`
      <p class="${cls}">
        ${format(h,m)} → <b>${val.toFixed(2)}x</b>
      </p>
    `);
  }

  document.getElementById("result").innerHTML =
    "<h3>📡 Completed Smart Signal Set</h3>" + output.join("");
}

</script>

</body>
</html>
