<!DOCTYPE html>
<html>
<head>
  <title>Signal simulator</title>

  <style>
    body {
      background: #0b0b0b;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    #lockscreen {
      position: fixed;
      inset: 0;
      background: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #error {
      color: red;
      margin-top: 10px;
    }

    .row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 6px 0;
    }

    input {
      padding: 8px;
      width: 130px;
      text-align: center;
      font-size: 14px;
    }

    button {
      padding: 10px 15px;
      margin: 10px;
      cursor: pointer;
    }

    .low { color: #00bfff; }
    .med { color: #a020f0; }
    .high { color: #ff4da6; }
  </style>
</head>

<body>

<!-- LOCK -->
<div id="lockscreen">
  <h2>🔐 Enter Passcode</h2>
  <input type="password" id="passcode">
  <button onclick="unlock()">Unlock</button>
  <div id="error"></div>
</div>

<h2>📊 Signal Row Editor</h2>

<div id="table"></div>

<button id="genBtn" onclick="generate()" disabled>Generate Predictions</button>

<div id="result"></div>

<script>

const PASS = "colsnist";

/* ---------------- LOCK ---------------- */
function unlock(){
  let p = document.getElementById("passcode");

  if(p.value === PASS){
    document.getElementById("lockscreen").style.display = "none";
    createRow();
  } else {
    document.getElementById("error").innerText = "Wrong passcode";
    p.value = "";
  }
}

/* ---------------- DATA ---------------- */
let data = [];
let index = 0;

/* ---------------- CREATE ROW ---------------- */
function createRow(){

  let table = document.getElementById("table");

  let row = document.createElement("div");
  row.className = "row";

  row.innerHTML = `
    <input id="time_${index}" placeholder="HH:MM">
    <input id="spike_${index}" placeholder="Spike">
  `;

  table.appendChild(row);

  let timeBox = document.getElementById(`time_${index}`);
  let spikeBox = document.getElementById(`spike_${index}`);

  // auto format time
  timeBox.addEventListener("input", function(){
    let v = this.value.replace(/\D/g,"");
    if(v.length >= 3){
      this.value = v.slice(0,2) + ":" + v.slice(2,4);
    } else {
      this.value = v;
    }
  });

  // move time → spike
  timeBox.addEventListener("keydown", function(e){
    if(e.key === "Enter"){
      spikeBox.focus();
    }
  });

  // spike → next row
  spikeBox.addEventListener("keydown", function(e){
    if(e.key === "Enter"){
      saveRow();
    }
  });

  timeBox.focus();
}

/* ---------------- SAVE ROW ---------------- */
function saveRow(){

  let t = document.getElementById(`time_${index}`).value;
  let s = parseFloat(document.getElementById(`spike_${index}`).value);

  if(!t || isNaN(s)){
    alert("Enter valid time and spike");
    return;
  }

  data[index] = { time: t, spike: s };

  index++;

  if(index < 10){
    createRow();
  } else {
    document.getElementById("genBtn").disabled = false;
  }
}

/* ---------------- GENERATE ---------------- */

function seededRandom(seed){
  let x = Math.sin(seed) * 10000;
  return x - Math.floor(x);
}

function classify(v){
  if(v < 2) return "low";
  if(v < 5) return "med";
  return "high";
}

function generate(){

  let values = data.map(d => d.spike);

  let avg = values.reduce((a,b)=>a+b,0)/values.length;
  let lastAvg = values.slice(-3).reduce((a,b)=>a+b,0)/Math.min(3,values.length);

  let seed = avg * 100;

  let out = "<h3>📡 Next 10 Signals</h3>";

  for(let i=1;i<=10;i++){

    let r = seededRandom(seed + i);
    let val;

    if(lastAvg > avg && r < 0.35){
      val = 5 + r * 25;
    }
    else if(lastAvg < avg && r < 0.75){
      val = 1 + r * 2.5;
    }
    else{
      val = 2 + r * 6;
    }

    let cls = classify(val);

    out += `<p class="${cls}">NEXT ${i} → <b>${val.toFixed(2)}x</b></p>`;
  }

  document.getElementById("result").innerHTML = out;
}

</script>

</body>
</html>
