
<!DOCTYPE html>
<html>
<head>
  <title>Crash Simulator</title>
  <h6>Made by:GLM</h6>

  <style>
    body {
      background: #0b0b0b;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    textarea {
      width: 85%;
      height: 180px;
      background: #111;
      color: white;
      border: 1px solid #333;
      padding: 10px;
      font-size: 14px;
    }

    button {
      padding: 10px 20px;
      margin-top: 10px;
      cursor: pointer;
    }

    .low { color: #00bfff; }
    .med { color: #a020f0; }
    .high { color: #ff4da6; }

    .box {
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid #333;
    }

    p { margin: 6px 0; }

    /* LOCKSCREEN */
    #lockscreen {
      position: fixed;
      width: 100%;
      height: 100%;
      background: black;
      top: 0;
      left: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 9999;
    }

    #error {
      color: red;
      margin-top: 10px;
    }

    input[type="password"] {
      padding: 10px;
      font-size: 14px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<!-- LOCKSCREEN -->
<div id="lockscreen">
  <h2>🔐Enter Passcode</h2>
  <input type="password" id="passcode" placeholder="Enter passcode">
  <button onclick="unlock()">Unlock</button>
  <div id="error"></div>
</div>

<h2>📊Crash Simulator</h2>

<p>Enter 10 past records (time-spike):</p>

<textarea id="input">
12:05-2
12:05-1
12:06-10
12:07-3
12:08-1
12:09-5
12:10-2
12:11-1
12:12-4
12:13-7
</textarea>

<br>
<button onclick="generate()">Generate Next 10</button>

<div id="result" class="box"></div>

<script>

const PASS = "colsnist";

/* ---------------- LOCK ---------------- */
function unlock(){
  let p = document.getElementById("passcode");

  if(p.value === PASS){
    document.getElementById("lockscreen").style.display = "none";
  } else {
    document.getElementById("error").innerText = "Wrong passcode";
    p.value = "";
  }
}

/* ---------------- CORE ---------------- */

function classify(v){
  if(v < 2) return "low";
  if(v < 5) return "med";
  return "high";
}

function seededRandom(seed){
  let x = Math.sin(seed) * 10000;
  return x - Math.floor(x);
}

function generate(){

  let raw = document.getElementById("input").value.trim();
  let lines = raw.split("\n");

  let values = [];

  for(let line of lines){
    let parts = line.split("-");
    if(parts.length !== 2) continue;

    let v = parseFloat(parts[1].trim());
    if(!isNaN(v)) values.push(v);
  }

  if(values.length < 3){
    alert("Enter at least 3 valid records");
    return;
  }

  let avg = values.reduce((a,b)=>a+b,0)/values.length;
  let lastAvg = values.slice(-3).reduce((a,b)=>a+b,0)/3;

  let seed = avg * 100;
  let output = [];

  for(let i = 1; i <= 10; i++){

    let r = seededRandom(seed + i);
    let val;

    if(lastAvg > avg && r < 0.35){
      val = 5 + r * 25;
    }
    else if(lastAvg < avg && r < 0.75){
      val = 1 + r * 2.5;
    }
    else{
      val = 2 + r * 6;
    }

    let cls = classify(val);

    output.push(`
      <p class="${cls}">
        NEXT ${i} → <b>${val.toFixed(2)}x</b>
      </p>
    `);
  }

  document.getElementById("result").innerHTML =
    "<h3>📡Predicted Signals</h3>" +
    output.join("");
}

</script>

</body>
</html>
